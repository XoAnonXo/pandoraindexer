# =============================================================================
# EVM Indexer (Ponder) — Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: pandora-evm-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pandora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pandora}
      POSTGRES_DB: ${POSTGRES_DB:-anymarket}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pandora} -d ${POSTGRES_DB:-anymarket}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pandora-evm-indexer
    network_mode: host
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  pgdata:
