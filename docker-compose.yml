# =============================================================================
# Docker Compose — EC2 Production
# =============================================================================
# Usage:
#   cp .env.prod.example .env.prod
#   # edit .env.prod with real values
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

services:
  postgres:
    image: postgres:15-alpine
    container_name: pandora-evm-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - /var/lib/pandora/evm-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder -d anymarket"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pandora-evm-indexer
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://ponder:ponder@postgres:5432/anymarket
    ports:
      - "42069:42069"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
